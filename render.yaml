services:
  - type: web
    name: saluslogica-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: saluslogica-db-v2
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: saluslogica-redis-v2
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: saluslogica-redis-v2
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: saluslogica-redis-v2
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: FRONTEND_URL
        value: "https://your-frontend.vercel.app"
      - key: TIME_ZONE
        value: "Africa/Kigali"

  - type: redis
    name: saluslogica-redis-v2
    plan: free
    ipAllowList: []

databases:
  - name: saluslogica-db-v2
    plan: free
    databaseName: saluslogica
    user: saluslogica
