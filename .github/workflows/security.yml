name: Security audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Dependency audit (pip-audit)
        run: |
          python -m pip_audit -r backend/requirements.txt
      - name: Static security scan (bandit)
        run: |
          python -m bandit -r backend/apps backend/saluslogica -ll
      - name: Django deploy checks
        env:
          DEBUG: "0"
          SECRET_KEY: "ci-not-a-secret"
          DATABASE_URL: "sqlite:///db.sqlite3"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          cd backend
          python manage.py check --deploy || true

  web:
    name: Web (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medicine-reminder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: medicine-reminder/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  mobile:
    name: Mobile (pnpm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level=high

